# ============================================================================
#  Alembic configuration
#  The database URL is taken from the DATABASE_URL environment variable at
#  runtime (see migrations/env.py); the value below is only a local default.
#  Use a SYNC driver for migrations (psycopg2), even though the app runs async.
# ============================================================================
[alembic]
script_location = migrations
prepend_sys_path = .
# Versioned, timestamped revision filenames:
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
sqlalchemy.url = postgresql+psycopg2://app:app@localhost:5432/inventory

[post_write_hooks]
# (optional) hooks=black ... left unconfigured

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
