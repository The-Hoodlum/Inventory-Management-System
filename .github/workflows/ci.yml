name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-unit:
    name: Ruff + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Ruff
        run: ruff check .
      - name: Unit tests
        run: python -m pytest tests/unit -q

  integration:
    name: Integration tests (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inventory
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d inventory"
          --health-interval 5s --health-timeout 5s --health-retries 15
    env:
      # The app connects as the non-superuser app_user so RLS is enforced (matches docker-compose).
      DATABASE_URL: postgresql+asyncpg://app_user:app_pw@localhost:5432/inventory
      JWT_SECRET_KEY: ci-only-test-secret-0123456789abcdef0123456789abcdef
      ENVIRONMENT: test
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: inventory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Provision database (same ordered init scripts as docker-compose)
        run: |
          set -e
          for f in \
            database/sql/schema.sql \
            backend/docker/02_app_role.sql \
            database/sql/seed_rbac.sql \
            database/sql/seed_demo.sql \
            database/sql/po_events.sql \
            database/sql/auth_hardening.sql \
            database/sql/demand_source.sql \
            database/sql/demand_forecasts.sql \
            database/sql/intelligence.sql \
            database/sql/reorder_risk.sql \
            database/sql/product_profile.sql \
            database/sql/supplier_scores.sql \
            database/sql/inventory_import.sql \
            database/sql/import_rollback.sql \
            database/sql/product_profile_flags.sql \
            database/sql/assistant.sql \
            database/sql/assistant_roles.sql \
            database/sql/tenant_settings.sql \
            database/sql/tenant_branding.sql \
            database/sql/order_requests.sql \
            database/sql/order_request_completion.sql \
            database/sql/import_targets_supplier_warehouse.sql \
            database/sql/order_request_purposes.sql \
            database/sql/seed_demo_locations.sql \
            database/sql/order_request_transfers.sql \
            database/sql/inventory_reservations.sql \
            database/sql/branches.sql \
            database/sql/seed_demo_branches.sql \
            database/sql/stock_transfers.sql \
            database/sql/stock_transfer_ledger.sql \
            database/sql/customers.sql \
            database/sql/sales_documents.sql \
            database/sql/sales_returns.sql \
            database/sql/motorcycle_units.sql \
            database/sql/motorcycle_import.sql \
            database/sql/dispatch_notes.sql \
            database/sql/issuances.sql \
            database/sql/customer_deliveries.sql \
            database/sql/reconstruction.sql \
            database/sql/product_wholesale_price.sql \
            database/sql/user_branch_access.sql \
            database/sql/order_request_transfer_permission.sql \
            database/sql/bike_issues.sql \
            database/sql/assembly_targets.sql \
            database/sql/motorcycle_country_of_origin.sql \
            database/sql/product_location.sql \
            database/sql/motorcycle_service.sql ; do
            echo "applying $f"
            psql -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Integration tests
        working-directory: backend
        run: python -m pytest tests/integration -q

  migrations:
    name: Alembic upgrade (fresh DB)
    runs-on: ubuntu-latest
    # Proves the SECOND supported bootstrap route: a clean `alembic upgrade head`
    # from an EMPTY database. The integration job above bootstraps via psql (the
    # schema.sql / docker-init path); this job exercises the Alembic path so the two
    # can never silently diverge (e.g. a colon-identifier in schema.sql that psql
    # treats as literal but SQLAlchemy would parse as a bind parameter).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inventory
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d inventory"
          --health-interval 5s --health-timeout 5s --health-retries 15
    env:
      # Migrations run through the SYNC driver (psycopg2), as configured in alembic.ini.
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/inventory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt
      - name: alembic upgrade head (fresh empty database)
        working-directory: database
        run: alembic upgrade head
      - name: Assert exactly one head
        working-directory: database
        run: |
          set -e
          alembic heads
          count=$(alembic heads | grep -c '(head)')
          if [ "$count" != "1" ]; then
            echo "Expected exactly one Alembic head, found $count"; exit 1
          fi
      - name: Show current revision
        working-directory: database
        run: alembic current

  frontend:
    name: Frontend typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Lint (tsc) + build
        run: npm run build
