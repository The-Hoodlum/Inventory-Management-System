# LOCAL-ONLY override (not committed): points the API at the real `lusaka` database
# running in the separate `ipp-app-db` container (published on host port 5433), instead of
# the demo `inventory` DB. Reached via host.docker.internal so it survives compose
# restarts with no network wiring.
#
# To go back to the demo data, delete this file and run `docker compose up -d api`.
services:
  api:
    environment:
      DATABASE_URL: postgresql+asyncpg://app_user:app_pw@host.docker.internal:5433/lusaka
