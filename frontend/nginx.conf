# nginx config for the production frontend image. Serves the built SPA and reverse-
# proxies the API so the browser talks to a single origin (no CORS, no exposed API port).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip for the static bundle.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Baseline security headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Container-level healthcheck target.
    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }

    # API -> backend service on the compose network. `api` resolves via Docker DNS.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 25m;   # spreadsheet imports
    }

    # Long-cache the fingerprinted assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every other path serves index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
