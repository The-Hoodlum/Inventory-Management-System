# ============================================================================
#  Inventory & Procurement Platform — PRODUCTION stack.
#
#  Differs from the eval stack (docker-compose.yml) in the ways that matter for a host:
#    • Clean database — schema + RBAC + every module, then ONE tenant/admin from env.
#      NO demo business data (see database/docker-init-prod.sh).
#    • Secrets come from the environment (.env.prod) — nothing sensitive is defaulted.
#    • The database port is NOT published; only the web tier is reachable.
#    • Frontend is built and served by nginx, which also reverse-proxies /api to the
#      backend, so the browser uses a single same-origin endpoint.
#
#  Usage (from the project root, with a filled .env.prod):
#    docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#  See docs/DEPLOYMENT.md for the full runbook (secrets, TLS, data load, backups).
# ============================================================================
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-inventory}
      # First-boot admin bootstrap (consumed by docker-init-prod.sh).
      ADMIN_EMAIL: ${ADMIN_EMAIL:?set ADMIN_EMAIL in .env.prod}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env.prod}
      TENANT_NAME: ${TENANT_NAME:-My Company}
      TENANT_SLUG: ${TENANT_SLUG:-main}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/docker-init-prod.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
      - ./database/sql:/sql:ro
      - ./backend/docker:/appdocker:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-inventory}"]
      interval: 5s
      timeout: 5s
      retries: 15
    # Note: no `ports:` — the database is reachable only on the internal network.

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://app_user:app_pw@db:5432/inventory}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY (min 32 chars) in .env.prod}
      ENVIRONMENT: production
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS to your public site URL in .env.prod}
      # Optional integrations — all inert unless enabled with a key (see .env.prod.example).
      ADVISOR_LLM_ENABLED: ${ADVISOR_LLM_ENABLED:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ADVISOR_MODEL: ${ADVISOR_MODEL:-claude-opus-4-8}
      ASSISTANT_ENABLED: ${ASSISTANT_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      # WhatsApp channel (inbound assistant + opt-in push). Stays on the 'mock' adapter
      # until PROVIDER=cloud AND a phone-number id + access token are supplied.
      # See docs/WHATSAPP.md for the end-to-end setup.
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-mock}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_BUSINESS_ACCOUNT_ID: ${WHATSAPP_BUSINESS_ACCOUNT_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      # Meta app secret — authenticates inbound webhooks (X-Hub-Signature-256 over the raw
      # body). Unset -> that check is DISABLED. Always set it in production.
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      WHATSAPP_API_BASE_URL: ${WHATSAPP_API_BASE_URL:-https://graph.facebook.com/v23.0}
      # Required to ROUTE inbound messages — without it webhooks are acknowledged, not answered.
      WHATSAPP_DEFAULT_TENANT_ID: ${WHATSAPP_DEFAULT_TENANT_ID:-}
      FREIGHTOS_ENABLED: ${FREIGHTOS_ENABLED:-false}
      FREIGHTOS_API_KEY: ${FREIGHTOS_API_KEY:-}
      FREIGHTOS_API_SECRET: ${FREIGHTOS_API_SECRET:-}
      INTEL_SCHEDULER_ENABLED: ${INTEL_SCHEDULER_ENABLED:-false}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 12
    # Note: no `ports:` — the API is reached through the web tier's /api proxy.

  web:
    build:
      context: ./frontend
      args:
        # Same-origin: the SPA calls /api/v1, nginx proxies it to the api service.
        VITE_API_BASE_URL: /api/v1
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  pgdata:
